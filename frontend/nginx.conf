server {
    listen 80;
    listen [::]:80;

    server_tokens off;                # Nginx versiyonunu response header'da gizle
    client_max_body_size 2m;          # Kötü niyetli büyük payload'ları engelle

    root /usr/share/nginx/html;
    index index.html;

    # ── Gzip sıkıştırma ────────────────────────────────────────────────────────
    gzip              on;
    gzip_vary         on;
    gzip_min_length   1024;
    gzip_comp_level   6;
    gzip_types        text/plain text/css application/json application/javascript
                      application/x-javascript text/xml application/xml application/xml+rss
                      text/javascript image/svg+xml font/ttf font/otf;

    # ── Güvenlik başlıkları (her yanıtta) ──────────────────────────────────────
    add_header X-Content-Type-Options   "nosniff"                                  always;
    add_header X-Frame-Options          "DENY"                                     always;
    add_header Referrer-Policy          "strict-origin-when-cross-origin"          always;
    add_header X-XSS-Protection         "1; mode=block"                            always;
    add_header Permissions-Policy       "geolocation=(), microphone=(), camera=()" always;
    # HTTPS arkasındaysa (Cloudflare / reverse proxy) HSTS aktifleştirilebilir:
    # add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # Content Security Policy — API, SignalR ve yaygın CDN logo kaynaklarına izin verir.
    # Gerçek domaine özel kısıtlama yapacaksanız connect-src / img-src değerlerini güncelleyin.
    add_header Content-Security-Policy "default-src 'self'; \
script-src 'self' 'unsafe-inline'; \
style-src  'self' 'unsafe-inline' https://fonts.googleapis.com; \
font-src   'self' https://fonts.gstatic.com data:; \
img-src    'self' data: https: blob:; \
connect-src 'self' ws: wss: https:; \
frame-ancestors 'none'; \
base-uri 'self'; \
form-action 'self'" always;

    # ── Statik asset cache'i (immutable) ──────────────────────────────────────
    location ~* \.(?:js|css|woff2?|ttf|otf|eot|ico|svg|png|jpg|jpeg|gif|webp|avif)$ {
        expires 1y;
        add_header Cache-Control "public, max-age=31536000, immutable";
        try_files $uri =404;
    }

    # ── index.html asla önbellekleme — her zaman taze olmalı ──────────────────
    location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        expires -1;
    }

    # ── Vue Router SPA fallback ───────────────────────────────────────────────
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ── REST API proxy → backend:5000 ─────────────────────────────────────────
    location /api/ {
        proxy_pass         http://backend:5000/api/;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 300s;
    }

    # ── SignalR / WebSocket proxy → backend:5000 ──────────────────────────────
    location /matchhub {
        proxy_pass         http://backend:5000/matchhub;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        "upgrade";
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 86400s;
    }

    # ── Gizli dosyalara erişimi engelle ───────────────────────────────────────
    location ~ /\.(env|git|vs|ht) { deny all; return 404; }
}

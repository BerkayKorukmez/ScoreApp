    <line x1="43"   y1="33.5" x2="40.5" y2="29"/>
    <line x1="51"   y1="42"   x2="49"   y2="37"/>
    <line x1="57"   y1="51"   x2="55.5" y2="45.5"/>
  </g>

  <!-- Saha elipsi — #2ECC71 ye?il -->
  <ellipse cx="32" cy="44" rx="21" ry="11" fill="#2ECC71"/>

  <!-- Saha çizgileri — beyaz ?effaf -->

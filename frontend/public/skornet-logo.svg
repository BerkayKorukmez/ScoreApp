  <circle  cx="32" cy="44" r="1" fill="#F8F9FA" opacity="0.6"/>

  <!-- Futbol topu -->
  <circle cx="32" cy="57.5" r="5.5" fill="#F8F9FA"/>
  <polygon points="32,52.5 29.2,54.8 30.3,57.8 33.7,57.8 34.8,54.8" fill="#1a1a1a"/>
  <line x1="29.2" y1="54.8" x2="26.5" y2="58"   stroke="#1a1a1a" stroke-width="0.7"/>
  <line x1="34.8" y1="54.8" x2="37.5" y2="58"   stroke="#1a1a1a" stroke-width="0.7"/>
  <line x1="30.3" y1="57.8" x2="28.5" y2="60.5" stroke="#1a1a1a" stroke-width="0.7"/>

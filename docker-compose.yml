services:

  # ── PostgreSQL ───────────────────────────────────────────────────────────────
  postgres:
    image: postgres:15-alpine
    container_name: skortakip-postgres
    # PORT açığa çıkarılmıyor: yalnızca backend container'ı erişebilsin (internal network)
    environment:
      POSTGRES_USER:     ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB:       ${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── .NET Backend API ─────────────────────────────────────────────────────────
  backend:
    build:
      context: ./backend/SkorTakip.API
      dockerfile: Dockerfile
    container_name: skortakip-backend
    # Yalnızca dahili network üzerinden çağrılır — public port YOK. nginx proxy'ler.
    expose:
      - "5000"
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - ASPNETCORE_URLS=http://+:5000
      - ConnectionStrings__DefaultConnection=Host=postgres;Port=5432;Database=${POSTGRES_DB};Username=${POSTGRES_USER};Password=${POSTGRES_PASSWORD}
      - JwtSettings__SecretKey=${JWT_SECRET}
      - Admin__Email=${ADMIN_EMAIL}
      - Admin__UserName=${ADMIN_USERNAME}
      - Admin__Password=${ADMIN_PASSWORD}
      - ApiSports__FootballApiKey=${FOOTBALL_API_KEY}
      - ApiSports__BasketballApiKey=${BASKETBALL_API_KEY}
      - ApiSports__VolleyballApiKey=${VOLLEYBALL_API_KEY}
      - Gemini__ApiKey=${GEMINI_API_KEY}
      - Gemini__Model=${GEMINI_MODEL:-gemini-3.1-flash-lite-preview}
      - NewsData__ApiKey=${NEWS_API_KEY}
      - AllowedOrigins=${ALLOWED_ORIGINS}
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:5000/health || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s

  # ── Vue Frontend (nginx) ─────────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: skortakip-frontend
    ports:
      - "3000:80"       # http://localhost:3000 → uygulama (prod'da 80/443 olarak yayınlayın)
    depends_on:
      - backend
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost/ || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3

volumes:
  postgres_data:

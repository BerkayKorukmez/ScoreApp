services:

  # ── PostgreSQL ───────────────────────────────────────────────────────────────
  postgres:
    image: postgres:15-alpine
    container_name: skortakip-postgres
    environment:
      POSTGRES_USER:     ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB:       ${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── .NET Backend API ─────────────────────────────────────────────────────────
  backend:
    build:
      context: ./backend/SkorTakip.API
      dockerfile: Dockerfile
    container_name: skortakip-backend
    # Kök .env → /app/.env: Program.cs içindeki EnvFileLoader ile GEMINI_API_KEY vb. (local dotnet run ile aynı)
    volumes:
      - ./.env:/app/.env:ro
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - ASPNETCORE_URLS=http://+:5000
      - ConnectionStrings__DefaultConnection=Host=postgres;Port=5432;Database=${POSTGRES_DB};Username=${POSTGRES_USER};Password=${POSTGRES_PASSWORD}
      - JwtSettings__SecretKey=${JWT_SECRET}
      - Admin__Email=${ADMIN_EMAIL}
      - Admin__UserName=${ADMIN_USERNAME}
      - Admin__Password=${ADMIN_PASSWORD}
      - ApiSports__FootballApiKey=${FOOTBALL_API_KEY}
      - ApiSports__BasketballApiKey=${BASKETBALL_API_KEY}
      - ApiSports__VolleyballApiKey=${VOLLEYBALL_API_KEY}
      - ApiSports__TennisApiKey=${TENNIS_API_KEY}
      - Gemini__ApiKey=${GEMINI_API_KEY}
      - Gemini__Model=${GEMINI_MODEL:-gemini-3.1-flash-lite-preview}
      - MatchPreview__GeminiApiKey=${MATCH_PREVIEW_GEMINI_API_KEY}
      - MatchPreview__Model=${MATCH_PREVIEW_GEMINI_MODEL:-gemini-3.1-flash-lite-preview}
      - NewsData__ApiKey=${NEWS_API_KEY}
      - AllowedOrigins=${ALLOWED_ORIGINS}
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  # ── Vue Frontend (nginx) ─────────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: skortakip-frontend
    ports:
      - "3000:80"       # http://localhost:3000 → uygulama
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  postgres_data:
